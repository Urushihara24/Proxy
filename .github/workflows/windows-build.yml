name: Build Windows App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app.py"
      - "desktop_proxy_launcher.py"
      - "proxy_seller_client.py"
      - "system_proxy.py"
      - "build_windows_app.ps1"
      - "build_windows_app.bat"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/windows-build.yml"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python --version
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest -q tests/test_proxy_seller_client.py

      - name: Build Windows EXE
        shell: pwsh
        run: .\build_windows_app.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          $exePath = "dist/Proxy Seller Launcher/Proxy Seller Launcher.exe"
          if (-not (Test-Path $exePath)) {
            throw "Build artifact not found: $exePath"
          }
          Get-Item $exePath | Format-List FullName, Length, LastWriteTime

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy-seller-launcher-windows
          path: |
            dist/Proxy Seller Launcher/Proxy Seller Launcher.exe
            dist/Proxy Seller Launcher/**
          if-no-files-found: error
          retention-days: 14
